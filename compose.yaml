services:
  phishing-dashboard:
    build: .
    container_name: phishing-email-dashboard
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
